<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugaryfish的弹幕姬</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell app-container">
      <div class="update-banner" id="updateBanner" hidden>
        <div class="update-banner-copy">
          <strong id="updateBannerTitle">已更新</strong>
          <span id="updateBannerBody">新特性已准备好。</span>
          <div class="update-progress" id="updateProgress" hidden>
            <i id="updateProgressBar"></i>
          </div>
        </div>
        <button class="update-banner-close" id="updateBannerClose" type="button" aria-label="关闭更新说明">×</button>
      </div>
      <span class="status-mode-tip" id="statusModeTip" aria-live="polite"></span>
      <section class="header-section">
        <div class="header-section-inner">
          <header class="titlebar">
            <div class="brand">
              <span class="mark status-dot"></span>
              <div class="brand-copy header-title">
                <strong>弹幕姬</strong>
                <span id="statusText" class="status">未连接</span>
              </div>
            </div>
            <div class="window-actions window-controls">
              <div class="help-menu">
                <button class="window-btn btn-note help-trigger" type="button" aria-label="使用说明">
                  <span aria-hidden="true">注</span>
                </button>
                <div class="help-card" role="tooltip">
                  <strong>使用说明</strong>
                  <p><span>01</span>点击 SESSDATA 右侧“获取”。</p>
                  <p><span>02</span>在弹出的 B 站窗口完成登录。</p>
                  <p><span>03</span>窗口会自动读取并保存 SESSDATA，无需手动复制 Cookie。</p>
                  <div class="help-divider"></div>
                  <dl class="help-meta">
                    <div><dt>项目</dt><dd><a href="https://github.com/Sugaryf1sh/sugaryfish-danmaku-hime" data-external-url="https://github.com/Sugaryf1sh/sugaryfish-danmaku-hime">GitHub</a></dd></div>
                    <div><dt>版本</dt><dd id="appVersionText">v--</dd></div>
                    <div><dt>更新</dt><dd>2026-06-22</dd></div>
                    <div><dt>联系</dt><dd>QQ 782654910</dd></div>
                  </dl>
                  <button class="help-update" id="updateBtn" type="button" title="检查更新">检查更新</button>
                </div>
              </div>
              <div class="theme-selector-wrapper">
                <button class="window-btn btn-theme" id="themeToggle" title="选择主题" aria-label="选择主题" aria-haspopup="true" aria-expanded="false" type="button">
                  <span aria-hidden="true">调</span>
                </button>
                <div class="theme-dropdown-menu">
                  <button class="theme-menu-item is-active" data-theme="light" type="button">
                    <span class="theme-name">Ⅰ . 纸墨</span>
                    <span class="theme-swatch swatch-light" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                  <button class="theme-menu-item" data-theme="moss" type="button">
                    <span class="theme-name">Ⅱ . 青苔</span>
                    <span class="theme-swatch swatch-moss" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                  <button class="theme-menu-item" data-theme="blueprint" type="button">
                    <span class="theme-name">Ⅲ . 白图</span>
                    <span class="theme-swatch swatch-blueprint" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                  <button class="theme-menu-item" data-theme="glacial" type="button">
                    <span class="theme-name">Ⅳ . 极地</span>
                    <span class="theme-swatch swatch-glacial" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                  <button class="theme-menu-item" data-theme="dark" type="button">
                    <span class="theme-name">Ⅴ . 暗耀</span>
                    <span class="theme-swatch swatch-dark" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                  <button class="theme-menu-item" data-theme="walnut" type="button">
                    <span class="theme-name">Ⅵ . 胡桃</span>
                    <span class="theme-swatch swatch-walnut" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                  <button class="theme-menu-item" data-theme="leica" type="button">
                    <span class="theme-name">Ⅶ . 纪实</span>
                    <span class="theme-swatch swatch-leica" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                  <button class="theme-menu-item" data-theme="bordeaux" type="button">
                    <span class="theme-name">Ⅷ . 波尔多</span>
                    <span class="theme-swatch swatch-bordeaux" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                  <button class="theme-menu-item" data-theme="quartz" type="button">
                    <span class="theme-name">Ⅸ . 瑰砂</span>
                    <span class="theme-swatch swatch-quartz" aria-hidden="true">
                      <span class="swatch-half swatch-half-left"></span>
                      <span class="swatch-half swatch-half-right"></span>
                    </span>
                  </button>
                </div>
              </div>
              <button class="window-btn btn-minimize" id="minimizeBtn" title="最小化" aria-label="最小化">
                <span aria-hidden="true">－</span>
              </button>
              <button class="window-btn btn-close" id="hideBtn" title="隐藏到托盘" aria-label="隐藏到托盘">
                <span aria-hidden="true">×</span>
              </button>
            </div>
          </header>

          <section class="connect-panel">
            <form id="connectForm" class="room-form input-row">
              <label for="roomInput">直播间</label>
              <input id="roomInput" class="input-value-display" name="roomId" inputmode="numeric" autocomplete="off" placeholder="输入房间号">
              <div class="input-actions-block">
                <button id="connectBtn" type="submit">连接</button>
              </div>
            </form>
            <div class="login-row input-row">
              <label for="sessdataInput">SESSDATA</label>
              <div class="secret-field" id="sessdataField">
                <input id="sessdataInput" type="password" autocomplete="off" spellcheck="false">
                <button class="secret-mask" id="sessdataMask" type="button" title="编辑 SESSDATA">
                  <span id="sessdataSummary" class="input-value-display">未填写</span>
                </button>
              </div>
              <div class="login-actions input-actions-block">
                <button class="sessdata-fetch" id="fetchSessdataBtn" type="button">获取</button>
                <button class="sessdata-clear" id="clearSessdataBtn" type="button">清空</button>
              </div>
            </div>
          </section>

          <section class="toolbar" aria-label="窗口设置">
            <button class="toggle" id="settingsToggle" type="button" title="展开或收起设置">
              <span class="options-title">设置 ▾</span><kbd class="options-sub">Options</kbd>
            </button>
            <div class="toolbar-actions">
              <button class="toggle danger" id="disconnectBtn" type="button" title="断开连接" hidden>断开</button>
            </div>
          </section>

          <section class="settings-panel" aria-label="设置详情">
            <div class="settings-panel-inner options-panel">
              <div class="toggle-group" role="group" aria-label="快捷开关">
                <button class="toggle setting-switch toggle-item active is-active" id="topToggle" type="button" title="置顶窗口 Ctrl+Alt+T">
                  <span class="toggle-label">置顶</span><kbd class="shortcut-key shortcut-hint">Ctrl Alt T</kbd>
                </button>
                <button class="toggle setting-switch toggle-item" id="throughToggle" type="button" title="鼠标穿透 Ctrl+Alt+J">
                  <span class="toggle-label">穿透</span><kbd class="shortcut-key shortcut-hint">Ctrl Alt J</kbd>
                </button>
                <button class="toggle setting-switch toggle-item" id="lockToggle" type="button" title="锁定窗口 Ctrl+Alt+L">
                  <span class="toggle-label">锁定</span><kbd class="shortcut-key shortcut-hint">Ctrl Alt L</kbd>
                </button>
                <button class="toggle setting-switch toggle-item" id="copyToggle" type="button" title="单击弹幕复制内容">
                  <span class="toggle-label">复制</span><kbd class="shortcut-key shortcut-hint">单击弹幕</kbd>
                </button>
              </div>
              <div class="setting-param-row param-group">
                <div class="setting-param-group setting-opacity-param param-item">
                  <label class="setting-control">
                    <span class="setting-label param-label">透明度</span>
                    <output class="param-value" id="opacityValue">100%</output>
                    <div class="range-line">
                      <input id="opacityRange" type="range" min="35" max="100" step="1">
                    </div>
                  </label>
                </div>
                <div class="setting-param-group setting-font-param param-item">
                  <label class="setting-control">
                    <span class="setting-label param-label">字号</span>
                    <output class="param-value" id="fontValue">15</output>
                    <div class="range-line">
                      <input id="fontRange" type="range" min="12" max="24" step="1">
                    </div>
                  </label>
                </div>
                <div class="setting-param-group setting-max-param param-item">
                  <label class="setting-control">
                    <span class="setting-label param-label">条数</span>
                    <output class="param-value" id="maxValue">80</output>
                    <div class="range-line">
                      <input id="maxRange" type="range" min="20" max="200" step="10">
                    </div>
                  </label>
                </div>
              </div>
            </div>
          </section>
        </div>
      </section>
      <div class="mega-gift-zone" id="megaGiftZone"></div>
      <section class="feed-wrap">
        <ol id="feed" class="feed" aria-live="polite"></ol>
        <div id="emptyState" class="empty-state placeholder-hint">
          输入直播间号，获取 SESSDATA 并连接后，弹幕会实时出现在这里。
        </div>
      </section>
      <div class="maker-watermark footer-container">
        <span class="footer-signature">CRAFTED BY SUGARYFISH</span>
        <span class="footer-dashboard">UPTIME: <span id="run-time">00H 00M</span> / TOTAL: <span id="msg-count">0</span></span>
      </div>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
